<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>German Flashcards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
  :root {
    --bg: #F7F5F0;
    --card: #FFFFFF;
    --ink: #2B2A28;
    --ink-soft: #6E6B64;
    --accent: #3A5A78;
    --accent-soft: #DCE6EE;
    --gold: #C99A3B;
    --gold-soft: #F6ECD6;
    --border: #E4E0D8;
    --red: #B5564A;
    --red-soft: #F5E4E1;
    --btn-text: #fff;
    --btn-hover: #2e4a63;
  }

  [data-theme="dark"] {
    --bg: #0D1117;
    --card: #161B22;
    --ink: #E6EDF3;
    --ink-soft: #8B949E;
    --accent: #5B8BAE;
    --accent-soft: #1E2D3A;
    --gold: #E3B341;
    --gold-soft: #3A2F0F;
    --border: #30363D;
    --red: #F47067;
    --red-soft: #3D1F1C;
    --btn-text: #fff;
    --btn-hover: #4A748F;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
  }

  main {
    width: 100%;
    max-width: 480px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
    gap: 8px;
  }

  .header-actions {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  #themeToggle {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    padding: 7px;
    color: var(--ink-soft);
    font-size: 16px;
  }

  #themeToggle:hover {
    border-color: var(--accent);
    color: var(--ink);
  }

  #themeToggle .inner-box {
    width: 100%;
    height: 100%;
    border-radius: 4px;
    border: 1px solid var(--ink-soft);
    background: var(--ink);
    transition: background 0.15s, border-color 0.15s;
  }

  #themeToggle:hover .inner-box {
    border-color: var(--accent);
  }

  h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.4rem;
    font-weight: 700;
    margin: 0;
    letter-spacing: -0.02em;
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    font-size: 0.85rem;
    color: var(--ink-soft);
    margin: 4px 0 0;
  }

  .subtitle a {
    color: var(--accent);
    text-decoration: none;
  }

  .subtitle a:hover {
    text-decoration: underline;
  }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 1.5rem;
  }

  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.85rem 1rem;
  }

  .stat-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    margin: 0 0 4px;
  }

  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.6rem;
    font-weight: 700;
    margin: 0;
  }

  .stat.due .stat-value {
    color: var(--accent);
    border-bottom: 3px solid var(--gold);
    display: inline-block;
    padding-bottom: 2px;
  }

  .card-zone {
    perspective: 1200px;
    margin-bottom: 1.5rem;
    min-height: 180px;
  }

  .flip-card {
    position: relative;
    width: 100%;
    min-height: 180px;
    cursor: pointer;
  }

  .flip-inner {
    position: relative;
    width: 100%;
    height: 100%;
    min-height: 180px;
    transition: transform 0.5s cubic-bezier(.2,.8,.2,1);
    transform-style: preserve-3d;
  }

  .flip-card.flipped .flip-inner {
    transform: rotateY(180deg);
  }

  .face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 1.5rem;
  }

  .face .lang {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    margin: 0 0 10px;
  }

  .face .word {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.6rem;
    font-weight: 700;
    margin: 0;
    word-break: break-word;
  }

  .face .hint {
    font-size: 0.75rem;
    color: var(--ink-soft);
    margin-top: 14px;
  }

  .face .example {
    font-size: 0.8rem;
    font-family: var(--font-serif, Georgia, serif);
    font-style: italic;
    color: var(--ink-soft);
    margin-top: 12px;
    max-width: 90%;
  }

  .face .note-tag {
    font-size: 0.7rem;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    color: var(--accent);
    background: var(--accent-soft);
    border-radius: 6px;
    padding: 2px 8px;
    margin-top: 8px;
    max-width: 90%;
    text-align: center;
  }

  .face.back {
    transform: rotateY(180deg);
  }

  .face.back .word {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
  }

  .icon-btn {
    position: absolute;
    background: none;
    border: none;
    color: var(--ink-soft);
    cursor: pointer;
    padding: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    font-size: 16px;
  }

  .icon-btn:hover {
    color: var(--ink);
    background: var(--accent-soft);
  }

  .speak-btn {
    top: 10px;
    right: 10px;
  }

  .edit-btn {
    top: 10px;
    left: 10px;
  }

  .empty-state {
    background: var(--card);
    border: 1px dashed var(--border);
    border-radius: 14px;
    min-height: 180px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: var(--ink-soft);
    font-size: 0.9rem;
    padding: 1.5rem;
  }

  .practice-filters {
    display: flex;
    gap: 8px;
  }

  .practice-filters button {
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    background: var(--accent);
    color: var(--btn-text);
    border: none;
    border-radius: 8px;
    padding: 0.5rem 0.9rem;
    cursor: pointer;
  }

  .practice-filters button:hover {
    background: var(--btn-hover);
  }

  .grade-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 0.75rem;
    height: 44px;
  }

  .grade-row.hidden {
    visibility: hidden;
  }

  .grade-row button {
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    border: 1px solid var(--border);
    background: var(--card);
    border-radius: 8px;
    cursor: pointer;
    color: var(--ink);
    transition: background 0.15s, border-color 0.15s;
  }

  .grade-row button:hover {
    background: var(--accent-soft);
    border-color: var(--accent);
  }

  .grade-row button[data-q="3"]:hover {
    background: var(--gold-soft);
    border-color: var(--gold);
  }

  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 1.25rem;
    font-size: 0.8rem;
  }

  .toolbar-label {
    color: var(--ink-soft);
    margin-right: 6px;
  }

  .toolbar-group {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .toolbar button {
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--ink);
    border-radius: 8px;
    padding: 0.4rem 0.7rem;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }

  .toolbar button:hover {
    background: var(--accent-soft);
    border-color: var(--accent);
  }

  #shuffleBtn i {
    font-size: 14px;
    vertical-align: -2px;
    margin-right: 4px;
  }

  .add-form {
    display: flex;
    gap: 8px;
    margin-bottom: 1rem;
  }

  .add-form input {
    flex: 1;
    min-width: 0;
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    padding: 0.6rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    color: var(--ink);
  }

  .add-form input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  .example-input {
    width: 100%;
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    padding: 0.5rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    color: var(--ink);
    margin-top: 8px;
    margin-bottom: 1rem;
  }

  .example-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  .add-form button {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    background: var(--accent);
    color: var(--btn-text);
    border: none;
    border-radius: 8px;
    padding: 0 1.1rem;
    cursor: pointer;
  }

  .add-form button:hover {
    background: var(--btn-hover);
  }

  .add-form button:disabled {
    opacity: 0.6;
    cursor: default;
  }

  .status-line {
    font-size: 0.75rem;
    color: var(--ink-soft);
    margin: 0 0 2rem;
    min-height: 1em;
  }

  .status-line.error {
    color: var(--red);
  }

  footer {
    margin-top: 2.5rem;
    text-align: center;
    font-size: 0.75rem;
    color: var(--ink-soft);
  }

  .section-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    width: 100%;
    background: none;
    border: none;
    color: var(--ink-soft);
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 0.75rem 0;
    border-top: 1px solid var(--border);
    cursor: pointer;
  }

  .section-toggle:hover {
    color: var(--ink);
  }

  .section-toggle i {
    font-size: 14px;
    transition: transform 0.15s;
  }

  .section-toggle.open i {
    transform: rotate(180deg);
  }

  .deck-section {
    padding-bottom: 1rem;
  }

  .deck-section.hidden {
    display: none;
  }

  .deck-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 300px;
    overflow-y: auto;
    margin-top: 0.75rem;
  }

  .deck-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.85rem;
    font-size: 0.85rem;
    gap: 8px;
  }

  .deck-item .pair {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }

  .deck-item .pair .de {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
  }

  .deck-item .pair .en {
    color: var(--ink-soft);
  }

  .deck-item .deck-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }

  .deck-item .deck-actions button {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-soft);
    font-size: 14px;
    padding: 4px;
    display: flex;
  }

  .deck-item .deck-actions button:hover {
    color: var(--ink);
  }

  .deck-item .deck-actions .del:hover {
    color: var(--red);
  }

  .deck-empty {
    text-align: center;
    color: var(--ink-soft);
    font-size: 0.85rem;
    padding: 1rem;
  }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.25rem;
    z-index: 50;
  }

  .modal-overlay.hidden {
    display: none;
  }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem;
    width: 100%;
    max-width: 360px;
  }

  .modal-title {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 1rem;
    margin: 0 0 1rem;
    color: var(--ink);
  }

  .modal-label {
    display: block;
    font-size: 0.75rem;
    color: var(--ink-soft);
    margin: 0.75rem 0 4px;
  }

  .modal input {
    width: 100%;
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    padding: 0.6rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--ink);
  }

  .modal input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 1.25rem;
  }

  .modal-actions button {
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--ink);
    border-radius: 8px;
    padding: 0.5rem 1rem;
    cursor: pointer;
  }

  .modal-actions button:hover {
    border-color: var(--accent);
  }

  .modal-actions button.primary {
    background: var(--accent);
    color: var(--btn-text);
    border: none;
  }

  .modal-actions button.primary:hover {
    background: var(--btn-hover);
  }

  .profile-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 1rem;
  }

  .profile-list button {
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    text-align: left;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--ink);
    border-radius: 8px;
    padding: 0.6rem 0.85rem;
    cursor: pointer;
  }

  .profile-list button:hover {
    border-color: var(--accent);
    background: var(--accent-soft);
  }

  .profile-list button .avatar-chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    font-size: 13px;
    margin-right: 8px;
    vertical-align: middle;
  }

  .avatar-picker {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 6px 0 0.5rem;
  }

  .avatar-picker button {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid transparent;
    background: var(--bg);
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    padding: 0;
  }

  .avatar-picker button.selected {
    border-color: var(--accent);
  }

  @media (prefers-reduced-motion: reduce) {
    .flip-inner { transition: none; }
  }

  @media (max-width: 480px) {
    body { padding: 1.5rem 0.75rem; }
    h1 { font-size: 1.25rem; }
    .card-zone, .flip-card, .flip-inner { min-height: 220px; }
    .face .word { font-size: 1.4rem; }
    .add-form { flex-direction: column; }
    .add-form input { font-size: 16px; padding: 0.75rem; }
    .add-form button { padding: 0.75rem 1.1rem; }
    .grade-row { height: 48px; }
    .grade-row button { font-size: 0.85rem; }
  }
</style>
</head>
<body>
<main>
  <header>
    <div>
      <h1>vokabel<span>karten</span></h1>
      <p class="subtitle">German vocabulary, spaced repetition &middot; <span id="profileLabel"></span> &middot; <a href="#" id="switchProfileLink">switch</a></p>
    </div>
    <div class="header-actions">
      <button id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode">
        <div class="inner-box"></div>
      </button>
    </div>
  </header>

  <div class="stats">
    <div class="stat due">
      <p class="stat-label">Practiced</p>
      <p class="stat-value" id="dueCount">0</p>
    </div>
    <div class="stat">
      <p class="stat-label">Deck</p>
      <p class="stat-value" id="totalCount">0</p>
    </div>
    <div class="stat">
      <p class="stat-label">Streak</p>
      <p class="stat-value" id="streakCount">0</p>
    </div>
  </div>

  <div class="card-zone" id="cardZone">
    <div class="empty-state">Loading your deck&hellip;</div>
  </div>
  <div class="grade-row hidden" id="gradeRow">
    <button data-q="1">Hard</button>
    <button data-q="2">Moderate</button>
    <button data-q="3">Easy</button>
  </div>

  <div class="toolbar">
    <button id="shuffleBtn" title="Shuffle deck order">
      <i class="ti ti-arrows-shuffle" aria-hidden="true"></i> Shuffle
    </button>
    <div class="toolbar-group">
      <span class="toolbar-label">Send to deck:</span>
      <button data-send="1">Hard</button>
      <button data-send="2">Moderate</button>
      <button data-send="3">Easy</button>
    </div>
  </div>

  <form class="add-form" id="addForm">
    <input id="frontInput" placeholder="German word" autocomplete="off" required />
    <input id="backInput" placeholder="English meaning" autocomplete="off" required />
    <button type="submit" id="addBtn">Add</button>
  </form>
  <input id="exampleInput" class="example-input" placeholder="Example sentence (optional)" autocomplete="off" />
  <input id="notesInput" class="example-input" placeholder="Notes (e.g. die, plural: Häuser)" autocomplete="off" />
  <p class="status-line" id="statusLine"></p>

  <button class="section-toggle" id="deckToggle" type="button">
    <i class="ti ti-chevron-down" aria-hidden="true"></i> Your deck
  </button>
  <div class="deck-section hidden" id="deckSection">
    <input id="deckSearch" class="example-input" placeholder="Search German or English..." autocomplete="off" />
    <div class="deck-list" id="deckList"></div>
  </div>

  <button class="section-toggle" id="chartToggle" type="button">
    <i class="ti ti-chevron-down" aria-hidden="true"></i> Progress
  </button>
  <div class="deck-section hidden" id="chartSection">
    <canvas id="growthChart" height="160"></canvas>
  </div>

  <footer>Saved to your Supabase database.</footer>
</main>

<div class="modal-overlay hidden" id="profileOverlay">
  <div class="modal">
    <p class="modal-title">Who's practicing?</p>
    <div class="profile-list" id="profileList"></div>
    <label class="modal-label" for="newProfileInput">Or add a new name</label>
    <input id="newProfileInput" autocomplete="off" placeholder="Your name" />
    <label class="modal-label">Pick an avatar</label>
    <div class="avatar-picker" id="emojiPicker"></div>
    <div class="modal-actions">
      <button id="profileGoBtn" type="button" class="primary">Continue</button>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="editOverlay">
  <div class="modal">
    <p class="modal-title">Edit card</p>
    <label class="modal-label" for="editFront">German</label>
    <input id="editFront" autocomplete="off" />
    <label class="modal-label" for="editBack">English</label>
    <input id="editBack" autocomplete="off" />
    <label class="modal-label" for="editExample">Example sentence (optional)</label>
    <input id="editExample" autocomplete="off" placeholder="e.g. Ich trinke Wasser." />
    <label class="modal-label" for="editNotes">Notes (optional)</label>
    <input id="editNotes" autocomplete="off" placeholder="e.g. die, plural: Häuser" />
    <div class="modal-actions">
      <button id="editCancelBtn" type="button">Cancel</button>
      <button id="editSaveBtn" type="button" class="primary">Save</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script>

const DAY = 86400000;

let cards = [];
let currentCard = null;
let flipped = false;
let practiceFilter = null;
let dueQueue = [];
let profile = '';

function now() { return Date.now(); }

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'de-DE';
  window.speechSynthesis.speak(utter);
}

function todayStr() {
  const d = new Date();
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
}

function daysBetween(a, b) {
  const d1 = new Date(a);
  const d2 = new Date(b);
  return Math.round((d2 - d1) / 86400000);
}

let streakValue = 0;

async function fetchStreak() {
  const { data, error } = await sb.from('streaks').select('*').eq('profile', profile).maybeSingle();
  if (error) return;
  streakValue = data ? (data.current_streak || 0) : 0;
  document.getElementById('streakCount').textContent = streakValue;
}

async function recordPracticeToday() {
  const { data } = await sb.from('streaks').select('*').eq('profile', profile).maybeSingle();
  const today = todayStr();
  const last = data ? data.last_practiced_date : null;
  let next = data ? (data.current_streak || 0) : 0;
  if (last === today) {
    return;
  } else if (last && daysBetween(last, today) === 1) {
    next = next + 1;
  } else {
    next = 1;
  }
  const { error: updErr } = await sb.from('streaks').upsert({
    profile, current_streak: next, last_practiced_date: today
  });
  if (!updErr) {
    streakValue = next;
    document.getElementById('streakCount').textContent = streakValue;
  }
}

function setStatus(msg, isError) {
  const el = document.getElementById('statusLine');
  el.textContent = msg || '';
  el.classList.toggle('error', !!isError);
}

async function fetchCards() {
  const { data, error } = await sb.from('cards').select('*').eq('profile', profile).order('due', { ascending: true });
  if (error) {
    setStatus('Could not load cards: ' + error.message, true);
    return [];
  }
  return data;
}

function getDueCards() {
  return cards.filter(c => c.due <= now());
}

function getPracticedCards() {
  return cards.filter(c => c.reps > 0);
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickCard() {
  const due = getDueCards();
  if (due.length === 0) {
    dueQueue = [];
    return null;
  }
  dueQueue = dueQueue.filter(id => due.some(c => c.id === id));
  due.forEach(c => { if (!dueQueue.includes(c.id)) dueQueue.push(c.id); });
  if (dueQueue.length === 0) return null;
  const nextId = dueQueue[0];
  return cards.find(c => c.id === nextId) || null;
}

async function addCard(front, back, example, notes) {
  const addBtn = document.getElementById('addBtn');
  addBtn.disabled = true;
  setStatus('Saving...');
  const { data, error } = await sb.from('cards').insert({
    front, back, interval: 0, due: now(), reps: 0, profile, example: example || null, notes: notes || null
  }).select();
  addBtn.disabled = false;
  if (error) {
    setStatus('Could not save: ' + error.message, true);
    return;
  }
  cards.push(data[0]);
  setStatus('Saved.');
  render();
}

async function deleteCard(id) {
  const { error } = await sb.from('cards').delete().eq('id', id);
  if (error) {
    setStatus('Could not delete: ' + error.message, true);
    return;
  }
  cards = cards.filter(c => String(c.id) !== String(id));
  if (currentCard && String(currentCard.id) === String(id)) {
    currentCard = null;
    flipped = false;
  }
  render();
}

let editingCard = null;

function openEditModal(card) {
  editingCard = card;
  document.getElementById('editFront').value = card.front;
  document.getElementById('editBack').value = card.back;
  document.getElementById('editExample').value = card.example || '';
  document.getElementById('editNotes').value = card.notes || '';
  document.getElementById('editOverlay').classList.remove('hidden');
}

function closeEditModal() {
  editingCard = null;
  document.getElementById('editOverlay').classList.add('hidden');
}

async function saveEditedCard() {
  if (!editingCard) return;
  const front = document.getElementById('editFront').value.trim();
  const back = document.getElementById('editBack').value.trim();
  const example = document.getElementById('editExample').value.trim();
  const notes = document.getElementById('editNotes').value.trim();
  if (!front || !back) return;
  const { error } = await sb.from('cards').update({ front, back, example: example || null, notes: notes || null }).eq('id', editingCard.id);
  if (error) {
    setStatus('Could not save edit: ' + error.message, true);
    return;
  }
  editingCard.front = front;
  editingCard.back = back;
  editingCard.example = example || null;
  editingCard.notes = notes || null;
  closeEditModal();
  setStatus('Card updated.');
  render();
}

async function grade(card, quality) {
  card.reps += 1;
  let base;
  if (card.interval === 0) base = 1;
  else if (card.interval === 1) base = quality === 1 ? 1 : (quality === 2 ? 3 : 4);
  else base = card.interval * (quality === 1 ? 1.3 : quality === 2 ? 2.2 : 3);
  card.interval = Math.max(1, Math.round(base));
  card.due = now() + card.interval * DAY;

  card.lastQuality = quality;

  const { error } = await sb.from('cards').update({
    interval: card.interval, due: card.due, reps: card.reps
  }).eq('id', card.id);

  if (error) {
    setStatus('Could not update: ' + error.message, true);
  }

  recordPracticeToday();

  flipped = false;
  dueQueue = dueQueue.filter(id => id !== card.id);
  currentCard = pickCard();
  if (!currentCard && practiceFilter !== null) {
    const pool = cards.filter(c => c.lastQuality === practiceFilter);
    currentCard = pool.length > 0 ? pool[Math.floor(Math.random() * pool.length)] : null;
  }
  render();
}

function renderCardZone() {
  const zone = document.getElementById('cardZone');
  const gradeRow = document.getElementById('gradeRow');

  if (cards.length === 0) {
    zone.innerHTML = '<div class="empty-state">You haven\'t added anything yet. Start now to practice.</div>';
    gradeRow.classList.add('hidden');
    return;
  }

  if (!currentCard) currentCard = pickCard();
  if (currentCard) practiceFilter = null;

  if (!currentCard) {
    if (practiceFilter !== null) {
      const pool = cards.filter(c => c.lastQuality === practiceFilter);
      if (pool.length > 0) {
        currentCard = pool[Math.floor(Math.random() * pool.length)];
      } else {
        const labels = { 1: 'Hard', 2: 'Moderate', 3: 'Easy' };
        const remaining = [1, 2, 3].filter(q => q !== practiceFilter);
        zone.innerHTML = `
          <div class="empty-state">
            <p style="margin:0 0 12px;">Nothing marked as ${labels[practiceFilter]}. Try another:</p>
            <div class="practice-filters">
              ${remaining.map(q => `<button data-pf="${q}">${labels[q]}</button>`).join('')}
            </div>
          </div>
        `;
        gradeRow.classList.add('hidden');
        zone.querySelectorAll('.practice-filters button').forEach(b => {
          b.onclick = () => {
            practiceFilter = parseInt(b.dataset.pf, 10);
            flipped = false;
            render();
          };
        });
        return;
      }
    } else {
      zone.innerHTML = `
        <div class="empty-state">
          <p style="margin:0 0 12px;">Nothing due right now. Practice by difficulty instead:</p>
          <div class="practice-filters">
            <button data-pf="1">Hard</button>
            <button data-pf="2">Moderate</button>
            <button data-pf="3">Easy</button>
          </div>
        </div>
      `;
      gradeRow.classList.add('hidden');
      zone.querySelectorAll('.practice-filters button').forEach(b => {
        b.onclick = () => {
          practiceFilter = parseInt(b.dataset.pf, 10);
          flipped = false;
          currentCard = null;
          render();
        };
      });
      return;
    }
  }

  const c = currentCard;
  zone.innerHTML = `
    <div class="flip-card ${flipped ? 'flipped' : ''}" id="flipCard">
      <div class="flip-inner">
        <div class="face front">
          <p class="lang">German</p>
          <p class="word">${escapeHtml(c.front)}</p>
          ${c.notes ? `<p class="note-tag">${escapeHtml(c.notes)}</p>` : ''}
          <p class="hint">Tap to reveal</p>
          <button class="icon-btn speak-btn" id="speakBtn" aria-label="Pronounce word" title="Pronounce">
            <i class="ti ti-volume" aria-hidden="true"></i>
          </button>
          <button class="icon-btn edit-btn" data-edit="front" aria-label="Edit card" title="Edit card">
            <i class="ti ti-edit" aria-hidden="true"></i>
          </button>
        </div>
        <div class="face back">
          <p class="lang">English</p>
          <p class="word">${escapeHtml(c.back)}</p>
          ${c.example ? `<p class="example">${escapeHtml(c.example)}</p>` : ''}
          ${c.notes ? `<p class="note-tag">${escapeHtml(c.notes)}</p>` : ''}
          <button class="icon-btn edit-btn" data-edit="back" aria-label="Edit card" title="Edit card">
            <i class="ti ti-edit" aria-hidden="true"></i>
          </button>
        </div>
      </div>
    </div>
  `;

  document.getElementById('speakBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    speak(c.front);
  });

  zone.querySelectorAll('.edit-btn').forEach(b => {
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      openEditModal(c);
    });
  });

  document.getElementById('flipCard').addEventListener('click', () => {
    if (!flipped) {
      flipped = true;
      render();
    }
  });

  if (flipped) {
    gradeRow.classList.remove('hidden');
    gradeRow.querySelectorAll('button').forEach(b => {
      b.onclick = (e) => {
        e.stopPropagation();
        grade(currentCard, parseInt(b.dataset.q, 10));
      };
    });
  } else {
    gradeRow.classList.add('hidden');
  }
}

function render() {
  document.getElementById('dueCount').textContent = getPracticedCards().length;
  document.getElementById('totalCount').textContent = cards.length;
  renderCardZone();
  renderDeckList();
}

function renderDeckList() {
  const list = document.getElementById('deckList');
  if (!list) return;
  const query = (document.getElementById('deckSearch').value || '').trim().toLowerCase();
  if (!query) {
    list.innerHTML = '<div class="deck-empty">Type to search your deck.</div>';
    return;
  }
  const filtered = cards.filter(c =>
    c.front.toLowerCase().includes(query) || c.back.toLowerCase().includes(query)
  );
  if (filtered.length === 0) {
    list.innerHTML = '<div class="deck-empty">No matches.</div>';
    return;
  }
  const sorted = [...filtered].sort((a, b) => a.front.localeCompare(b.front));
  list.innerHTML = sorted.map(c => `
    <div class="deck-item">
      <div class="pair">
        <span class="de">${escapeHtml(c.front)}</span>
        <span class="en"> — ${escapeHtml(c.back)}</span>
      </div>
      <div class="deck-actions">
        <button class="deck-edit" data-id="${c.id}" aria-label="Edit card" title="Edit"><i class="ti ti-edit" aria-hidden="true"></i></button>
        <button class="del" data-id="${c.id}" aria-label="Delete card" title="Delete"><i class="ti ti-trash" aria-hidden="true"></i></button>
      </div>
    </div>
  `).join('');
  list.querySelectorAll('.deck-edit').forEach(b => {
    b.addEventListener('click', () => {
      const card = cards.find(c => String(c.id) === b.dataset.id);
      if (card) openEditModal(card);
    });
  });
  list.querySelectorAll('.del').forEach(b => {
    b.addEventListener('click', () => deleteCard(b.dataset.id));
  });
}

document.getElementById('addForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const frontInput = document.getElementById('frontInput');
  const backInput = document.getElementById('backInput');
  const exampleInput = document.getElementById('exampleInput');
  const notesInput = document.getElementById('notesInput');
  const front = frontInput.value.trim();
  const back = backInput.value.trim();
  const example = exampleInput.value.trim();
  const notes = notesInput.value.trim();
  if (front && back) {
    await addCard(front, back, example, notes);
    frontInput.value = '';
    backInput.value = '';
    exampleInput.value = '';
    notesInput.value = '';
    frontInput.focus();
  }
});

document.getElementById('shuffleBtn').addEventListener('click', async () => {
  if (cards.length === 0) return;
  setStatus('Shuffling and resetting progress...');
  for (const c of cards) {
    c.interval = 0;
    c.due = now();
    c.reps = 0;
    c.lastQuality = null;
    const { error } = await sb.from('cards').update({
      interval: 0, due: c.due, reps: 0
    }).eq('id', c.id);
    if (error) {
      setStatus('Could not update: ' + error.message, true);
      return;
    }
  }
  setStatus('Deck reshuffled, progress reset.');
  flipped = false;
  practiceFilter = null;
  dueQueue = shuffleArray(cards.map(c => c.id));
  currentCard = cards.find(c => c.id === dueQueue[0]) || null;
  render();
});

document.querySelectorAll('.toolbar-group button[data-send]').forEach(b => {
  b.addEventListener('click', async () => {
    const quality = parseInt(b.dataset.send, 10);
    const toSend = cards.filter(c => c.lastQuality === quality);
    if (toSend.length === 0) {
      setStatus('No cards marked as ' + b.textContent.trim() + '.');
      return;
    }
    setStatus('Sending cards back to deck...');
    for (const c of toSend) {
      c.interval = 0;
      c.due = now();
      c.reps = 0;
      c.lastQuality = null;
      const { error } = await sb.from('cards').update({
        interval: 0, due: c.due, reps: 0
      }).eq('id', c.id);
      if (error) {
        setStatus('Could not update: ' + error.message, true);
        return;
      }
    }
    setStatus(toSend.length + ' card(s) sent back to deck.');
    flipped = false;
    practiceFilter = null;
    currentCard = pickCard();
    render();
  });
});

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
}

function initTheme() {
  let theme = 'light';
  try {
    theme = localStorage.getItem('vokabelkarten-theme') || 'light';
  } catch (e) {}
  applyTheme(theme);
}

document.getElementById('themeToggle').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
  const next = current === 'dark' ? 'light' : 'dark';
  applyTheme(next);
  try { localStorage.setItem('vokabelkarten-theme', next); } catch (e) {}
  const chartSection = document.getElementById('chartSection');
  if (chartSection && !chartSection.classList.contains('hidden')) renderGrowthChart();
});

initTheme();

// Section toggles
function setupSectionToggle(toggleId, sectionId, onOpen) {
  const toggle = document.getElementById(toggleId);
  const section = document.getElementById(sectionId);
  toggle.addEventListener('click', () => {
    const isHidden = section.classList.contains('hidden');
    section.classList.toggle('hidden');
    toggle.classList.toggle('open');
    if (isHidden && onOpen) onOpen();
  });
}

setupSectionToggle('deckToggle', 'deckSection', renderDeckList);
setupSectionToggle('chartToggle', 'chartSection', renderGrowthChart);

document.getElementById('deckSearch').addEventListener('input', renderDeckList);

// Progress chart
let growthChartInstance = null;

function renderGrowthChart() {
  const canvas = document.getElementById('growthChart');
  if (!canvas || typeof Chart === 'undefined') return;
  if (cards.length === 0) {
    canvas.style.display = 'none';
    let msg = document.getElementById('chartEmptyMsg');
    if (!msg) {
      msg = document.createElement('div');
      msg.id = 'chartEmptyMsg';
      msg.className = 'deck-empty';
      msg.textContent = 'Add some cards to see your progress.';
      canvas.parentNode.appendChild(msg);
    }
    return;
  }
  canvas.style.display = 'block';
  const existingMsg = document.getElementById('chartEmptyMsg');
  if (existingMsg) existingMsg.remove();

  const sorted = [...cards].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
  const labels = [];
  const data = [];
  let count = 0;
  sorted.forEach(c => {
    count++;
    const d = new Date(c.created_at);
    labels.push(d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }));
    data.push(count);
  });

  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const gridColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
  const textColor = isDark ? '#8B949E' : '#6E6B64';
  const lineColor = isDark ? '#5B8BAE' : '#3A5A78';

  if (growthChartInstance) growthChartInstance.destroy();
  growthChartInstance = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Total cards',
        data,
        borderColor: lineColor,
        backgroundColor: lineColor,
        tension: 0.2,
        pointRadius: 2,
        fill: false
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: textColor, maxTicksLimit: 6 }, grid: { color: gridColor } },
        y: { ticks: { color: textColor, precision: 0 }, grid: { color: gridColor }, beginAtZero: true }
      }
    }
  });
}

document.getElementById('editCancelBtn').addEventListener('click', closeEditModal);
document.getElementById('editSaveBtn').addEventListener('click', saveEditedCard);
document.getElementById('editOverlay').addEventListener('click', (e) => {

const EMOJI_OPTIONS = ['🦊','🐻','🐱','🐶','🦉','🐢','🐸','🦁','🐼','🐧','🦄','🐝'];

let selectedEmoji = EMOJI_OPTIONS[0];

function renderAvatarPickers() {
  const emojiEl = document.getElementById('emojiPicker');
  emojiEl.innerHTML = EMOJI_OPTIONS.map(e =>
    `<button type="button" data-emoji="${e}" class="${e === selectedEmoji ? 'selected' : ''}">${e}</button>`
  ).join('');
  emojiEl.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      selectedEmoji = b.dataset.emoji;
      renderAvatarPickers();
    });
  });
}

function avatarChip(emoji) {
  return `<span class="avatar-chip" style="background:var(--accent-soft);">${emoji || ''}</span>`;
}

async function fetchKnownProfiles() {
  const { data: cardRows, error: cardErr } = await sb.from('cards').select('profile');
  const { data: streakRows } = await sb.from('streaks').select('profile, avatar_emoji');
  if (cardErr || !cardRows) return [];
  const names = new Set(cardRows.map(r => r.profile).filter(Boolean));
  const avatarMap = {};
  (streakRows || []).forEach(r => { avatarMap[r.profile] = r; });
  return Array.from(names).map(n => ({
    name: n,
    emoji: avatarMap[n] ? avatarMap[n].avatar_emoji : null
  }));
}

async function showProfilePicker() {
  const overlay = document.getElementById('profileOverlay');
  const list = document.getElementById('profileList');
  const known = await fetchKnownProfiles();
  if (known.length === 0) {
    list.innerHTML = '<p style="font-size:0.85rem; color: var(--ink-soft); margin:0;">No profiles yet — add the first name below.</p>';
  } else {
    list.innerHTML = known.map(p =>
      `<button data-profile="${escapeHtml(p.name)}">${avatarChip(p.emoji)}${escapeHtml(p.name)}</button>`
    ).join('');
    list.querySelectorAll('button').forEach(b => {
      b.addEventListener('click', () => selectProfile(b.dataset.profile));
    });
  }
  renderAvatarPickers();
  overlay.classList.remove('hidden');
}

let currentAvatar = { emoji: null };

async function selectProfile(name) {
  name = name.trim();
  if (!name) return;
  const isNew = !(await fetchKnownProfiles()).some(p => p.name === name);
  profile = name;
  try { localStorage.setItem('vokabelkarten-profile', profile); } catch (e) {}
  document.getElementById('profileOverlay').classList.add('hidden');
  cards = await fetchCards();
  await fetchStreak();
  if (isNew) {
    currentAvatar = { emoji: selectedEmoji };
    await sb.from('streaks').upsert({ profile, avatar_emoji: selectedEmoji });
  } else {
    const { data } = await sb.from('streaks').select('avatar_emoji').eq('profile', profile).maybeSingle();
    currentAvatar = { emoji: data ? data.avatar_emoji : null };
  }
  document.getElementById('profileLabel').innerHTML = avatarChip(currentAvatar.emoji) + escapeHtml(profile);
  practiceFilter = null;
  dueQueue = [];
  currentCard = null;
  flipped = false;
  render();
  if (cards.length === 0) setStatus('');
}

document.getElementById('profileGoBtn').addEventListener('click', () => {
  const input = document.getElementById('newProfileInput');
  const name = input.value.trim();
  if (name) {
    input.value = '';
    selectProfile(name);
  }
});

document.getElementById('newProfileInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('profileGoBtn').click();
});

document.getElementById('switchProfileLink').addEventListener('click', (e) => {
  e.preventDefault();
  showProfilePicker();
});

(async function init() {
  let saved = '';
  try { saved = localStorage.getItem('vokabelkarten-profile') || ''; } catch (e) {}
  if (saved) {
    await selectProfile(saved);
  } else {
    await showProfilePicker();
  }
})();
